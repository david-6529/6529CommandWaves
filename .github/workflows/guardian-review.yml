name: Command Waves Guardian

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: command-waves-guardian-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardian:
    name: Command Waves Guardian
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify deterministic guardian
        run: npm run guardian:check

      - name: Verify PR command evidence
        id: guardian-pr-check
        if: github.event_name == 'pull_request'
        run: npm run guardian:pr-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GUARDIAN_ATTESTATION_PATH: guardian-attestation.json
          COMMAND_WAVE_STATE_PATH: ${{ vars.COMMAND_WAVE_STATE_PATH }}
          COMMAND_WAVE_STATE_URL: ${{ vars.COMMAND_WAVE_STATE_URL }}

      - name: Upload guardian attestation
        if: always() && hashFiles('guardian-attestation.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: guardian-attestation
          path: guardian-attestation.json
          if-no-files-found: error

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
